<meta name="robots" content="noindex">
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESP32 RTK 控制面板 (Mobile VB)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        /* 針對手機優化的全域設定 */
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 10px; margin: 0; box-sizing: border-box; }
        * { box-sizing: border-box; }

        /* 模擬經典 VB 視窗外框 (改為寬度自適應手機螢幕) */
        .window { background: #e0e0e0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); }
        
        /* 模擬 VB 藍色標題列 */
        .title-bar { background-image: linear-gradient(to right, #000080, #1084d0); color: white; padding: 6px 10px; font-weight: bold; margin: -15px -15px 15px -15px; font-size: 14px; }
        
        /* 內嵌區塊 */
        .group { border: 1px solid #808080; padding: 12px; margin-bottom: 15px; background: #fff; position: relative; margin-top: 15px; }
        .group-title { position: absolute; top: -10px; left: 10px; background: #fff; padding: 0 5px; font-size: 12px; font-weight: bold; color: #333; }
        
        /* 手機版上下排版：標籤在上，輸入框在下，手指才好按 */
        .field { margin-bottom: 12px; display: flex; flex-direction: column; align-items: flex-start; }
        .field:last-child { margin-bottom: 0; }
        
        label { font-size: 13px; font-weight: bold; color: #444; margin-bottom: 4px; }
        
        /* 放大輸入框，方便手機操作 */
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #808080; font-size: 15px; background-color: #fff; -webkit-appearance: none; border-radius: 0; }
        
        /* 模擬 VB 灰色立體按鈕 (放大高度與字體) */
        button { padding: 12px 20px; background: #e0e0e0; border: 2px solid #fff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; -webkit-appearance: none; }
        button:active { border: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; background: #d5d5d5; }
        
        #status { font-weight: bold; color: red; }
        /* 狀態數值樣式 */
        .val { width: 100%; font-weight: bold; color: blue; font-size: 16px; padding: 4px 0; }
      
        /* 針對您 class="group" 裡面的 table 按鈕進行設定 */
        .group table button {
          width: 100%;             /* 強迫按鈕填滿它那一格 td 的 30% 寬度 */
          box-sizing: border-box;  /* 邊框和內距不額外撐大按鈕 */
          white-space: nowrap;     /* 強迫文字絕對不換行，解決 3 個字變形的問題 */
    
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">RTK 控制面板 (KY002)</div>
    
    <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">
        連線狀態: <span id="status">正在連線至 MQTTGO...</span>
    </div>

    <div class="group">
        <div class="group-title">NMEA即時狀態(5秒更新)</div>
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">定位狀態:</label>
            <span id="rtk_sol" class="val" style="width: auto; text-align: right;"></span>
        </div>
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">緯度 (Lat):</label>
            <span id="rtk_lat" class="val" style="width: auto; text-align: right;"></span>
        </div>
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">經度 (Lon):</label>
            <span id="rtk_lon" class="val" style="width: auto; text-align: right;"></span>
        </div>
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">橢球高 (Ellipsoid):</label>
            <span id="rtk_ell" class="val" style="width: auto; text-align: right;"></span>
        </div>     
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">海拔高 (Altitude):</label>
            <span id="rtk_alt" class="val" style="width: auto; text-align: right;"></span>
        </div>
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">地面高 (Geoid):</label>
            <span id="rtk_geo" class="val" style="width: auto; text-align: right;"></span>
        </div>      
        <div class="field" style="flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <label style="margin-bottom: 0;">UTC 時間:</label>
            <span id="rtk_time" class="val" style="width: auto; text-align: right;"></span>
        </div>
    </div>

  
  
    <div class="group">
     <div class="group-title">連線模式</div>
        <table width="100%" border="0">
            <tr>
                <td width="30%" align="center"><button onclick="send_idle()">離線</button></td>
                <td width="30%" align="center"><button onclick="send_rover()">移動站</button></td>
                <td width="30%" align="center"><button onclick="send_base()">基站</button></td>
            </tr>
        </table>
    </div>  
  
  
    <div class="group">
        <div class="group-title">基站座標</div>
        <div class="field">
            <label>緯度 (Latitude):</label>
            <input type="text" id="base_lat" value="">
        </div>
        <div class="field">
            <label>經度 (Longitude):</label>
            <input type="text" id="base_lon" value="">
        </div>
        <div class="field">
            <label>高度 (Height):</label>
            <input type="text" id="base_ell" value="">
        </div>
     
      <button onclick="sendBase()">設為基地站</button>
     </div>
  
    <div class="group">
        <div class="group-title"></div>
     
      <button onclick="sendRover()">設為移動站</button>
      
     </div>
  
    <div class="group">
        <div class="group-title">NTRIP 伺服器設定</div>
      
        <div class="field">
            <label>IP / 網址:</label>
            <input type="text" id="ntrip_ip" value="kynet.asuscomm.com">
        </div>
      
        <div class="field">
            <label>連接埠 (Port):</label>
            <input type="text" id="ntrip_port" value="5000">
        </div>
      
        <div class="field">
            <label>掛載點 (Mount):</label>
            <input type="text" id="ntrip_mount" value="base01">
        </div>
      
        <div class="field">
            <label>基站名稱:</label>
            <input type="text" id="base_mount" value="base01">
        </div> 
      
        <div class="field">
            <label>User:</label>
            <input type="text" id="ntrip_user" value="admin">
        </div>
      
        <div class="field">
            <label>Password:</label>
            <input type="text" id="ntrip_pass" value="12345678">
        </div>   
      
            <table width="100%" border="0">
            <tr>
                <td width="50%" align="center"><button onclick="sendConfig()">修改送出</button></td>
                <td width="50%" align="center"><button onclick="loadConfig()">重新讀取</button></td>
            </tr>
            </table>
      </div>
  
      <div class="group">
        <div class="group-title">自訂內容發送</div>
        <div class="field">
            <input type="text" id="Text1" value="">
        </div>     
      <button onclick="sendButton1()">送出</button>
     </div>
  
  </div>

<script>
  
  let geoid = 0;
    // ═══════════════ MQTTGO 伺服器與 Topic 設定 ═══════════════
    const host = 'wss://mqttgo.vip:8084/mqtt'; 
    const myTopic = '/user/ky23205238/RTK/KY002/cmd'; // 網頁發佈(傳送)給 ESP32 的主題
    const reportTopic1 = '/user/ky23205238/RTK/KY002/nmea'; // 網頁訂閱(接收) ESP32 狀態的主題
    const reportTopic2 = '/user/ky23205238/RTK/KY002/log'; // 網頁訂閱(接收) ESP32 狀態的主題

    // MQTT 連線參數設定
    const options = {
        connectTimeout: 4000,
        clientId: 'KY' + Math.random().toString(16).substr(2, 8),
        username: 'ky23205238', 
        password: 'aUrtuBx3VRQ5', 
    };

    console.log('正在連線至 MQTTGO...');
    const client = mqtt.connect(host, options);

    client.on('connect', () => {
        document.getElementById('status').innerText = '連線成功';
        document.getElementById('status').style.color = 'green';
        client.subscribe(reportTopic1);
        client.subscribe(reportTopic2);
    });

    client.on('error', (err) => {
        document.getElementById('status').innerText = '連線失敗';
        document.getElementById('status').style.color = 'red';
    });

    client.on('message', (topic, message) => {
        const msgString = message.toString();
        
        if (topic === reportTopic1) {
            try {
                // 將收到的純文字嘗試解析為 JSON 物件
                const data = JSON.parse(msgString);
                
                // 1. 填入定位狀態 (對齊你的 FixType)
                if (data.FixType) {
                    document.getElementById('rtk_sol').innerText = data.FixType;
                    
                    // 根據解算狀態動態變更顏色 (如果內含 "FIX" 或數字 "4" 變綠色)
                    if (data.FixType.includes("FIX") || data.FixType.includes("4")) {
                        document.getElementById('rtk_sol').style.color = "green";
                    } else {
                        document.getElementById('rtk_sol').style.color = "blue";
                    }
                }
                
                // 2. 填入十進位經緯度 (對齊 LatDeg, LonDeg)
                if (data.LatDeg && data.LatDMS) {
                    document.getElementById('rtk_lat').innerText = data.LatDeg + " / " + data.LatDMS;
                }
                if (data.LonDeg && data.LonDMS) {
                    document.getElementById('rtk_lon').innerText = data.LonDeg + " / " + data.LonDMS;
                }         
                                
                // 4. 填入海拔高程 (對齊 Alt)
                if (data.Ellipsoid !== undefined) document.getElementById('rtk_ell').innerText = data.Ellipsoid + " m";
                
                // 4. 填入海拔高程 (對齊 Alt)
                if (data.Alt !== undefined) document.getElementById('rtk_alt').innerText = data.Alt + " m";

                // 4. 填入海拔高程 (對齊 Alt)
                if (data.Geo !== undefined) {
                  document.getElementById('rtk_geo').innerText = data.Geo + " m";
                  geoid = data.Geo;
                }
                // 5. 填入 ESP32 傳過來的硬體時間 (對齊 UTC)
                if (data.UTC) {
                    document.getElementById('rtk_time').innerText = data.UTC;
                }

            } catch (e) {
                console.warn("非JSON數據，已自動忽略。");
            }
        }
      
        else if (topic === reportTopic2) {
            try {
                // 將收到的純文字嘗試解析為 JSON 物件
                const data = JSON.parse(msgString); 
                                
                // 4. 填入海拔高程 (對齊 Alt)
                if (data.host!== undefined) document.getElementById('ntrip_ip').value = data.host;
                
                // 4. 填入海拔高程 (對齊 Alt)
                if (data.port !== undefined) document.getElementById('ntrip_port').value = data.port;

                // 4. 填入海拔高程 (對齊 Alt)
                if (data.mount !== undefined)document.getElementById('ntrip_mount').value = data.mount;

                // 5. 填入 ESP32 傳過來的硬體時間 (對齊 UTC)
                if (data.user) {
                    document.getElementById('ntrip_user').value = data.user;
                }
                if (data.pw) {
                    document.getElementById('ntrip_pass').value = data.pw;
                }
                if (data.base_mount) {
                    document.getElementById('base_mount').value = data.base_mount;
                }              
            } catch (e) {
                console.warn("非JSON數據，已自動忽略。");
            }
        }      
    });
  

  
    function send_idle() {

        client.publish(myTopic, "{\"mode\":\"idle\"}", { qos: 1 });
    }
    function send_rover() {

        client.publish(myTopic, "{\"mode\":\"rover\"}", { qos: 1 });
    }
    function send_base() {

        client.publish(myTopic, "{\"mode\":\"base\"}", { qos: 1 });
    }  
  
  function sendConfig() {
        const config = {
            host: document.getElementById('ntrip_ip').value,
            port: parseInt(document.getElementById('ntrip_port').value),
            mount: document.getElementById('ntrip_mount').value,
            base_mount: document.getElementById('base_mount').value,
            user: document.getElementById('ntrip_user').value,
            pw: document.getElementById('ntrip_pass').value          
        };

        const jsonString = JSON.stringify(config);
        
        client.publish(myTopic, jsonString, { qos: 1 });

    }
    function loadConfig() {

        client.publish(myTopic, "AT+CONFIG?", { qos: 1 });
    }

    function sendBase() {


    // 1. 先把輸入框的原始文字抓出來（先不急著轉數字，不然一轉成數字，空的就會變 NaN）
        const raw_lat = document.getElementById('base_lat').value.trim();
        const raw_lon = document.getElementById('base_lon').value.trim();
        const raw_ell = document.getElementById('base_ell').value.trim();

        let target_lat = "";
        let target_lon = "";
        let target_alt = "";


        if (raw_lat !== "" && raw_lon !== "" && raw_ell !== "") {      
            target_lat = raw_lat;
            target_lon = raw_lon;
            const calculated_alt = parseFloat(raw_ell) - geoid; // 正常做減法運算
            target_alt = calculated_alt.toFixed(4);
        }


        const base_buf = "MODE BASE " + target_lat + " " + target_lon + " " + target_alt;

        client.publish(myTopic, base_buf, { qos: 1 });        
    }

  
    function sendRover() {

        client.publish(myTopic, "MODE ROVER", { qos: 1 });
    }
  
  
// ═══════════════ 【自訂按鈕：改為直接發送純文字】 ═══════════════
    function sendButton1() {
        // 抓取對應輸入框的純文字內容
        //const inputId = 'custom_val' + num;
        const rawText = document.getElementById('Text1').value;

        // 直接把這串純文字 Publish 出去，完全不包裝 JSON
        client.publish(myTopic, rawText, { qos: 1 });
    }

</script>
</body>
</html>
